server:
  # Render (and most PaaS) inject the listen port via the PORT env var; locally we
  # fall back to 8080. Without this Spring binds 8080 and Render's port scanner
  # times out with "No open ports detected" before health-check can run.
  port: ${PORT:8080}

spring:
  application:
    name: whatsnext-auth-api
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  access-expiration: ${JWT_ACCESS_EXPIRATION:900}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

rate-limit:
  login:
    capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
    refill-seconds: 60
  register:
    capacity: ${RATE_LIMIT_REGISTER_CAPACITY:3}
    refill-seconds: 60
  refresh:
    capacity: ${RATE_LIMIT_REFRESH_CAPACITY:10}
    refill-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
