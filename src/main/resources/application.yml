spring:
  application:
    name: whatsnext-auth-api
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  access-expiration: ${JWT_ACCESS_EXPIRATION:900}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

rate-limit:
  login:
    capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
    refill-seconds: 60
  register:
    capacity: ${RATE_LIMIT_REGISTER_CAPACITY:3}
    refill-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
