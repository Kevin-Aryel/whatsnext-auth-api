name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

  unit-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test jacoco:report

      - name: Upload JaCoCo XML
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml
          path: target/site/jacoco/jacoco.xml
          retention-days: 1

      - name: Upload Allure unit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-unit-results
          path: target/allure-results/
          retention-days: 7

  e2e-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run E2E tests + generate Allure report
        run: mvn verify allure:report -DskipUnitTests=true

      - name: Upload Allure E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-e2e-results
          path: target/allure-results/
          retention-days: 7

      - name: Upload Allure E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-e2e-report
          path: target/site/allure-maven-plugin/
          retention-days: 7

      - name: Upload Spring Boot app log (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-e2e-log
          path: target/spring-boot.log
          retention-days: 3
          if-no-files-found: ignore

  sonar:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download JaCoCo XML
        uses: actions/download-artifact@v4
        with:
          name: jacoco-xml
          path: target/site/jacoco/

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Compile
        run: mvn compile -q

      - name: SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=kevinaryeldev_whatsnext-auth-api \
            -Dsonar.organization=kevinaryeldev \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  deploy:
    needs: [e2e-tests, sonar]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Deploy to Render
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$DEPLOY_HOOK_URL"
